name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # The CI workflow only runs on main pushes and PRs, so a `v*` tag would
  # otherwise publish without any test run guarding it.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .[dev,mcp,watch]
      - run: pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          python - "$GITHUB_REF_NAME" <<'EOF'
          import pathlib
          import re
          import sys

          tag = sys.argv[1]
          path = pathlib.Path("src/hdl_kgraph/__init__.py")
          match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', path.read_text())
          if not match:
              print(f"::error::Could not find __version__ in {path}")
              sys.exit(1)
          pkg_version = match[1]
          if pkg_version != tag.removeprefix("v"):
              print(
                  f"::error::Tag {tag} does not match __version__ {pkg_version} "
                  f"in {path}. Bump the version before tagging."
              )
              sys.exit(1)
          print(f"Tag {tag} matches __version__ {pkg_version}")
          EOF
      - run: python -m pip install build twine
      - run: python -m build
      - run: twine check --strict dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hdl-kgraph
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
