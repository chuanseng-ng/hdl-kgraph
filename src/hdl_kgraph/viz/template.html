<!DOCTYPE html>
<!-- Generated by hdl-kgraph `visualize`. Fully self-contained: the vendored
     d3 bundle (ISC, Mike Bostock) and the graph JSON are inlined below. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>hdl-kgraph</title>
<style>
  :root { --bg:#11151c; --panel:#1a212c; --ink:#d8dee9; --dim:#7b8496; --line:#2c3543; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:13px/1.45 "SF Mono", Menlo, Consolas, monospace; }
  header { display:flex; gap:14px; align-items:center; padding:8px 14px;
           background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:14px; margin:0 12px 0 0; font-weight:600; }
  .tab { cursor:pointer; padding:4px 10px; border:1px solid var(--line); border-radius:4px;
         color:var(--dim); user-select:none; }
  .tab.active { color:var(--ink); background:#243044; }
  #search { margin-left:auto; background:var(--bg); color:var(--ink);
            border:1px solid var(--line); border-radius:4px; padding:4px 8px; width:220px; }
  main { display:flex; height:calc(100vh - 41px); }
  #sidebar { width:230px; min-width:230px; overflow-y:auto; padding:10px 12px;
             background:var(--panel); border-right:1px solid var(--line); }
  #sidebar h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em;
                color:var(--dim); margin:12px 0 4px; }
  #sidebar label { display:flex; gap:6px; align-items:center; padding:1px 0; cursor:pointer; }
  #sidebar .swatch { width:9px; height:9px; border-radius:2px; display:inline-block; }
  #view { flex:1; position:relative; overflow:hidden; }
  #canvas { position:absolute; inset:0; }
  #hier { position:absolute; inset:0; overflow:auto; padding:14px 18px; display:none; }
  #hier ul { list-style:none; margin:0; padding-left:18px; border-left:1px solid var(--line); }
  #hier > ul { border-left:none; padding-left:0; }
  #hier li { padding:1px 0; }
  #hier .toggle { cursor:pointer; color:var(--dim); margin-right:4px; }
  #hier .mod { color:#88c0d0; }
  #hier .inst { color:var(--ink); }
  #hier .mark { color:#bf616a; }
  #hier .dim-mark { color:var(--dim); }
  #tooltip { position:absolute; pointer-events:none; background:#000c; color:var(--ink);
             padding:6px 9px; border-radius:4px; font-size:12px; display:none;
             max-width:380px; border:1px solid var(--line); }
  #stats { position:absolute; right:10px; bottom:8px; color:var(--dim); font-size:11px; }
</style>
</head>
<body>
<header>
  <h1 id="title">hdl-kgraph</h1>
  <span class="tab active" data-tab="hier">hierarchy</span>
  <span class="tab" data-tab="graph">graph</span>
  <input id="search" type="search" placeholder="find by name…">
</header>
<main>
  <div id="sidebar">
    <h2>node kinds</h2><div id="kind-filters"></div>
    <h2>edge kinds</h2><div id="edge-filters"></div>
    <h2>clock domains</h2><div id="domain-filters"></div>
  </div>
  <div id="view">
    <div id="hier"></div>
    <canvas id="canvas"></canvas>
    <div id="tooltip"></div>
    <div id="stats"></div>
  </div>
</main>
<script>/*__D3__*/</script>
<script id="graph-data" type="application/json">/*__DATA__*/</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById("graph-data").textContent);
document.getElementById("title").textContent = DATA.title || "hdl-kgraph";
document.title = DATA.title || "hdl-kgraph";

const KIND_COLORS = {
  module:"#88c0d0", entity:"#8fbcbb", interface:"#81a1c1", program:"#5e81ac",
  package:"#b48ead", vhdl_package:"#b48ead", class:"#a3be8c", instance:"#ebcb8b",
  signal:"#d8dee9", port:"#e5e9f0", process:"#d08770", parameter:"#7b8496",
  assertion:"#bf616a", property:"#bf616a", sequence:"#bf616a", covergroup:"#d699b6",
  coverpoint:"#d699b6", constraint:"#d699b6", clocking_block:"#d08770",
  architecture:"#8fbcbb", file:"#4c566a", macro:"#4c566a",
};
const NOISY_KINDS = new Set(["file","port","parameter","signal","macro","include_file",
                             "enum_member","typedef"]);
const NOISY_EDGES = new Set(["declares","reads","connects","parameterizes"]);
const color = k => KIND_COLORS[k] || "#9aa3b2";
/* SV escaped identifiers / VHDL extended identifiers may contain markup
   characters — everything interpolated into HTML goes through this. */
const esc = s => String(s).replace(/[&<>"']/g, ch =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));

/* ---------- filters ---------- */
const nodeKinds = [...new Set(DATA.nodes.map(n => n.kind))].sort();
const edgeKinds = [...new Set(DATA.links.map(l => l.kind))].sort();
const activeKinds = new Set(nodeKinds.filter(k => !DATA.full || !NOISY_KINDS.has(k)));
const activeEdges = new Set(edgeKinds.filter(k => !DATA.full || !NOISY_EDGES.has(k)));
const activeDomains = new Set(DATA.domains); let domainOnly = false;

function checkboxes(host, items, active, swatchFor, onchange) {
  const div = document.getElementById(host);
  for (const item of items) {
    const label = document.createElement("label");
    const box = document.createElement("input");
    box.type = "checkbox"; box.checked = active.has(item);
    box.addEventListener("change", () => { box.checked ? active.add(item) : active.delete(item); onchange(); });
    label.appendChild(box);
    if (swatchFor) {
      const sw = document.createElement("span");
      sw.className = "swatch"; sw.style.background = swatchFor(item);
      label.appendChild(sw);
    }
    label.appendChild(document.createTextNode(item));
    div.appendChild(label);
  }
}
checkboxes("kind-filters", nodeKinds, activeKinds, color, refresh);
checkboxes("edge-filters", edgeKinds, activeEdges, null, refresh);
if (DATA.domains.length) {
  checkboxes("domain-filters", DATA.domains, activeDomains, null, refresh);
} else {
  document.getElementById("domain-filters").textContent =
    DATA.full ? "none detected" : "(run with --full)";
}

/* ---------- hierarchy view ---------- */
function hierNode(n) {
  const li = document.createElement("li");
  const has = n.children.length > 0;
  const toggle = document.createElement("span");
  toggle.className = "toggle"; toggle.textContent = has ? "▾" : "·";
  li.appendChild(toggle);
  const label = document.createElement("span");
  const name = (n.instance ? `<span class="inst">${esc(n.instance)}</span>: ` : "")
             + `<span class="mod">${esc(n.module)}${n.architecture ? "(" + esc(n.architecture) + ")" : ""}</span>`
             + (n.unresolved ? ' <span class="mark">[?]</span>'
                : n.confidence < 0.8 ? ` <span class="dim-mark">[~${n.confidence.toFixed(1)}]</span>` : "")
             + (n.truncated ? ' <span class="dim-mark">(…)</span>' : "");
  label.innerHTML = name;
  li.appendChild(label);
  if (has) {
    const ul = document.createElement("ul");
    for (const c of n.children) ul.appendChild(hierNode(c));
    li.appendChild(ul);
    toggle.addEventListener("click", () => {
      const hidden = ul.style.display === "none";
      ul.style.display = hidden ? "" : "none";
      toggle.textContent = hidden ? "▾" : "▸";
    });
  }
  return li;
}
{
  const root = document.getElementById("hier");
  const ul = document.createElement("ul");
  for (const t of DATA.hierarchy) ul.appendChild(hierNode(t));
  root.appendChild(ul);
}

/* ---------- force view (canvas: SVG dies near 1k nodes) ---------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");
let width = 0, height = 0, transform = d3.zoomIdentity, query = "";

const nodes = DATA.nodes.map(n => ({...n}));
const byId = new Map(nodes.map(n => [n.id, n]));
const links = DATA.links.filter(l => byId.has(l.source) && byId.has(l.target))
                        .map(l => ({...l}));

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(60).strength(0.4))
  .force("charge", d3.forceManyBody().strength(-120))
  .force("center", d3.forceCenter())
  .force("collide", d3.forceCollide(10))
  .on("tick", draw);

function nodeVisible(n) {
  if (!activeKinds.has(n.kind)) return false;
  if (n.domain && DATA.domains.length && !activeDomains.has(n.domain)) return false;
  return true;
}
function draw() {
  ctx.save();
  ctx.clearRect(0, 0, width, height);
  ctx.translate(width / 2 + transform.x, height / 2 + transform.y);
  ctx.scale(transform.k, transform.k);
  const q = query.toLowerCase();
  for (const l of links) {
    if (!activeEdges.has(l.kind) || !nodeVisible(l.source) || !nodeVisible(l.target)) continue;
    ctx.beginPath();
    ctx.setLineDash(l.confidence < 0.8 ? [4, 3] : []);
    ctx.strokeStyle = "#3b4657";
    ctx.lineWidth = Math.min(2.5, 0.6 + (l.weight || 1) * 0.3);
    ctx.moveTo(l.source.x, l.source.y);
    ctx.lineTo(l.target.x, l.target.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  let shown = 0;
  for (const n of nodes) {
    if (!nodeVisible(n)) continue;
    shown++;
    const hit = q && n.name.toLowerCase().includes(q);
    const r = hit ? 8 : 5;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, 2 * Math.PI);
    ctx.fillStyle = q && !hit ? "#3b4657" : color(n.kind);
    ctx.fill();
    if (n.unresolved) { ctx.strokeStyle = "#bf616a"; ctx.lineWidth = 1.4; ctx.stroke(); }
    if (transform.k > 0.9 || hit) {
      ctx.fillStyle = hit ? "#ffd479" : "#9aa3b2";
      ctx.font = "10px monospace";
      ctx.fillText(n.name, n.x + r + 3, n.y + 3);
    }
  }
  ctx.restore();
  document.getElementById("stats").textContent = nodes.length
    ? `${shown}/${nodes.length} nodes · ${links.length} edges`
    : "no nodes in the graph payload — rebuild and re-run visualize";
}
function refresh() { draw(); }

function resize() {
  /* Embedded/iframe viewers (Safari previews, IDE webviews) can report
     devicePixelRatio 0 or zero client sizes; any of those zeroes the
     bitmap and the view stays dark while the DOM keeps updating. */
  const view = document.getElementById("view");
  width = canvas.clientWidth || view.clientWidth;
  height = canvas.clientHeight || view.clientHeight;
  if (!width || !height) { requestAnimationFrame(resize); return; }
  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr; canvas.height = height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
new ResizeObserver(resize).observe(canvas);

function pick(event) {
  const [px, py] = d3.pointer(event.sourceEvent || event, canvas);
  const x = (px - width / 2 - transform.x) / transform.k;
  const y = (py - height / 2 - transform.y) / transform.k;
  const n = sim.find(x, y, 12 / transform.k);
  return n && nodeVisible(n) ? n : null;
}
d3.select(canvas)
  .call(d3.drag()
    .subject(pick)
    .on("start", e => { if (!e.active) sim.alphaTarget(0.25).restart();
                        e.subject.fx = e.subject.x; e.subject.fy = e.subject.y; })
    .on("drag", e => { e.subject.fx = e.x; e.subject.fy = e.y; })
    .on("end", e => { if (!e.active) sim.alphaTarget(0);
                      e.subject.fx = null; e.subject.fy = null; }))
  .call(d3.zoom().scaleExtent([0.05, 8])
    .on("zoom", e => { transform = e.transform; draw(); }));
canvas.addEventListener("mousemove", event => {
  const n = pick(event);
  if (!n) { tooltip.style.display = "none"; return; }
  tooltip.style.display = "block";
  tooltip.style.left = (event.offsetX + 14) + "px";
  tooltip.style.top = (event.offsetY + 14) + "px";
  tooltip.innerHTML = `<b>${esc(n.name)}</b><br>${esc(n.kind)}`
    + (n.domain ? `<br>domain: ${esc(n.domain)}` : "")
    + (n.file ? `<br>${esc(n.file)}${n.line ? ":" + n.line : ""}` : "");
});

/* ---------- tabs + search ---------- */
const views = { hier: document.getElementById("hier"), graph: canvas };
for (const tab of document.querySelectorAll(".tab")) {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const which = tab.dataset.tab;
    views.hier.style.display = which === "hier" ? "block" : "none";
    /* visibility (not display) so the canvas always has its layout size:
       sizing it only on first tab switch breaks in viewers with deferred
       layout. Hidden elements get no pointer events, so #hier still works. */
    canvas.style.visibility = which === "graph" ? "visible" : "hidden";
    if (which === "graph") resize();
  });
}
views.hier.style.display = "block"; canvas.style.visibility = "hidden";
document.getElementById("search").addEventListener("input", e => {
  query = e.target.value.trim();
  draw();
  const q = query.toLowerCase();
  for (const el of document.querySelectorAll("#hier .mod, #hier .inst"))
    el.style.background = q && el.textContent.toLowerCase().includes(q) ? "#4c3a1e" : "";
});
</script>
</body>
</html>
