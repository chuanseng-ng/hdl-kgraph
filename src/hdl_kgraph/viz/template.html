<!DOCTYPE html>
<!-- Generated by hdl-kgraph `visualize`. Fully self-contained: the vendored
     d3 bundle (ISC, Mike Bostock) and the graph JSON are inlined below. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>hdl-kgraph</title>
<style>
  :root { --bg:#11151c; --panel:#1a212c; --ink:#d8dee9; --dim:#7b8496; --line:#2c3543; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:13px/1.45 "SF Mono", Menlo, Consolas, monospace; }
  header { display:flex; gap:14px; align-items:center; padding:8px 14px;
           background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:14px; margin:0 12px 0 0; font-weight:600; }
  .tab { cursor:pointer; padding:4px 10px; border:1px solid var(--line); border-radius:4px;
         color:var(--dim); user-select:none; }
  .tab.active { color:var(--ink); background:#243044; }
  #search { margin-left:auto; background:var(--bg); color:var(--ink);
            border:1px solid var(--line); border-radius:4px; padding:4px 8px; width:220px; }
  main { display:flex; height:calc(100vh - 41px); }
  #sidebar { width:230px; min-width:230px; overflow-y:auto; padding:10px 12px;
             background:var(--panel); border-right:1px solid var(--line); }
  #sidebar h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em;
                color:var(--dim); margin:12px 0 4px; }
  #sidebar label { display:flex; gap:6px; align-items:center; padding:1px 0; cursor:pointer; }
  #sidebar .swatch { width:9px; height:9px; border-radius:2px; display:inline-block; }
  #view { flex:1; position:relative; overflow:hidden; }
  /* No `inset` shorthand: older engines ignore it, and an absolute canvas
     with auto offsets sizes itself from its bitmap — which feeds back into
     the bitmap on resize and grows it without bound. */
  /* Defaults mirror the default-active tab (hierarchy): the canvas starts
     hidden and #hier shown without waiting on JS, so the graph can never paint
     over the hierarchy tab if the (async) script is mid-flight or throws. The
     tab handler toggles these inline at runtime. */
  #canvas { position:absolute; top:0; left:0; width:100%; height:100%;
            visibility:hidden; }
  #hier { position:absolute; top:0; left:0; width:100%; height:100%;
          overflow:auto; padding:14px 18px; display:block; }
  #hier ul { list-style:none; margin:0; padding-left:18px; border-left:1px solid var(--line); }
  #hier > ul { border-left:none; padding-left:0; }
  #hier li { padding:1px 0; }
  #hier .toggle { cursor:pointer; color:var(--dim); margin-right:4px; }
  #hier .mod { color:#88c0d0; }
  #hier .inst { color:var(--ink); }
  #hier .mark { color:#bf616a; }
  #hier .dim-mark { color:var(--dim); }
  #tooltip { position:absolute; pointer-events:none; background:#000c; color:var(--ink);
             padding:6px 9px; border-radius:4px; font-size:12px; display:none;
             max-width:380px; border:1px solid var(--line); }
  #stats { position:absolute; right:10px; bottom:8px; color:var(--dim); font-size:11px; }
  #recenter { position:absolute; right:10px; top:10px; display:none; cursor:pointer;
              background:var(--panel); color:var(--dim); border:1px solid var(--line);
              border-radius:4px; padding:4px 10px; font:inherit; user-select:none; }
  #recenter:hover { color:var(--ink); background:#243044; }
</style>
</head>
<body>
<header>
  <h1 id="title">hdl-kgraph</h1>
  <span class="tab active" data-tab="hier">hierarchy</span>
  <span class="tab" data-tab="graph">graph</span>
  <input id="search" type="search" placeholder="find by name…">
</header>
<main>
  <div id="sidebar">
    <h2>node kinds</h2><div id="kind-filters"></div>
    <h2>edge kinds</h2><div id="edge-filters"></div>
    <h2>communities</h2><div id="community-filters"></div>
  </div>
  <div id="view">
    <div id="hier"></div>
    <canvas id="canvas"></canvas>
    <div id="tooltip"></div>
    <div id="stats"></div>
    <button id="recenter" title="Reset pan and zoom">re-centre</button>
  </div>
</main>
<script>/*__D3__*/</script>
<script id="graph-data" type="application/json" data-encoding="/*__ENC__*/">/*__DATA__*/</script>
<script>
"use strict";
/* The payload is inlined either as plain JSON or, for large designs, as
   gzip+base64 (viz-scalability Phase 4b) decoded here via DecompressionStream.
   That decode is async, so the whole viewer runs inside the async IIFE below. */
async function loadGraphData() {
  const el = document.getElementById("graph-data");
  const text = el.textContent;
  if (el.dataset.encoding !== "gzip+base64") return JSON.parse(text);
  if (typeof DecompressionStream === "undefined") {
    document.body.innerHTML = '<p style="padding:1em;font-family:monospace">'
      + 'This graph is gzip-compressed and this browser lacks DecompressionStream. '
      + 'Open it in a current browser, or re-export with <code>hdl-kgraph export</code>.</p>';
    throw new Error("DecompressionStream unavailable");
  }
  const bytes = Uint8Array.from(atob(text), c => c.charCodeAt(0));
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
  return JSON.parse(await new Response(stream).text());
}

(async function main() {
const DATA = await loadGraphData();
document.getElementById("title").textContent = DATA.title || "hdl-kgraph";
document.title = DATA.title || "hdl-kgraph";

const KIND_COLORS = {
  module:"#88c0d0", entity:"#8fbcbb", interface:"#81a1c1", program:"#5e81ac",
  package:"#b48ead", vhdl_package:"#b48ead", class:"#a3be8c", instance:"#ebcb8b",
  signal:"#d8dee9", port:"#e5e9f0", process:"#d08770", parameter:"#7b8496",
  assertion:"#bf616a", property:"#bf616a", sequence:"#bf616a", covergroup:"#d699b6",
  coverpoint:"#d699b6", constraint:"#d699b6", clocking_block:"#d08770",
  architecture:"#8fbcbb", file:"#4c566a", macro:"#4c566a",
};
const NOISY_KINDS = new Set(["file","port","parameter","signal","macro","include_file",
                             "enum_member","typedef"]);
const NOISY_EDGES = new Set(["declares","reads","connects","parameterizes"]);
const color = k => KIND_COLORS[k] || "#9aa3b2";
/* SV escaped identifiers / VHDL extended identifiers may contain markup
   characters — everything interpolated into HTML goes through this. */
const esc = s => String(s).replace(/[&<>"']/g, ch =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));

/* ---------- filters ---------- */
const nodeKinds = [...new Set(DATA.nodes.map(n => n.kind))].sort();
const edgeKinds = [...new Set(DATA.links.map(l => l.kind))].sort();
/* In collapse mode the aggregation already controls volume, so don't also
   default the noisy kinds off — expanding a unit should reveal its signals. */
const activeKinds = new Set(nodeKinds.filter(k => DATA.collapse || !DATA.full || !NOISY_KINDS.has(k)));
const activeEdges = new Set(edgeKinds.filter(k => DATA.collapse || !DATA.full || !NOISY_EDGES.has(k)));

function checkboxes(host, items, active, swatchFor, onchange) {
  const div = document.getElementById(host);
  for (const item of items) {
    const label = document.createElement("label");
    const box = document.createElement("input");
    box.type = "checkbox"; box.checked = active.has(item);
    box.addEventListener("change", () => { box.checked ? active.add(item) : active.delete(item); onchange(); });
    label.appendChild(box);
    if (swatchFor) {
      const sw = document.createElement("span");
      sw.className = "swatch"; sw.style.background = swatchFor(item);
      label.appendChild(sw);
    }
    label.appendChild(document.createTextNode(item));
    div.appendChild(label);
  }
}
checkboxes("kind-filters", nodeKinds, activeKinds, color, refresh);
checkboxes("edge-filters", edgeKinds, activeEdges, null, refresh);

/* Louvain communities of the module projection (subsystem suggestions).
   Color by community defaults on in projection mode, where every node is a
   design unit and kind-based coloring is uniform anyway. */
const activeComms = new Set(DATA.communities);
let colorByCommunity = (DATA.collapse || !DATA.full) && DATA.communities.length > 1;
const COMM_COLORS = ["#88c0d0","#a3be8c","#ebcb8b","#d08770","#b48ead",
                     "#81a1c1","#bf616a","#8fbcbb","#d699b6","#5e81ac"];
const commColor = c => COMM_COLORS[+c % COMM_COLORS.length];
if (DATA.communities.length) {
  const host = document.getElementById("community-filters");
  const label = document.createElement("label");
  const box = document.createElement("input");
  box.type = "checkbox"; box.checked = colorByCommunity;
  box.addEventListener("change", () => { colorByCommunity = box.checked; refresh(); });
  label.appendChild(box);
  label.appendChild(document.createTextNode("colour by community"));
  host.appendChild(label);
  checkboxes("community-filters", DATA.communities, activeComms, commColor, refresh);
} else {
  document.getElementById("community-filters").textContent = "none detected";
}

/* ---------- hierarchy view ---------- */
function hierNode(n) {
  const li = document.createElement("li");
  const has = n.children.length > 0;
  const toggle = document.createElement("span");
  toggle.className = "toggle"; toggle.textContent = has ? "▾" : "·";
  li.appendChild(toggle);
  const label = document.createElement("span");
  const name = (n.instance ? `<span class="inst">${esc(n.instance)}</span>: ` : "")
             + `<span class="mod">${esc(n.module)}${n.architecture ? "(" + esc(n.architecture) + ")" : ""}</span>`
             + (n.unresolved ? ' <span class="mark">[?]</span>'
                : n.confidence < 0.8 ? ` <span class="dim-mark">[~${n.confidence.toFixed(1)}]</span>` : "")
             + (n.truncated ? ' <span class="dim-mark">(…)</span>' : "");
  label.innerHTML = name;
  li.appendChild(label);
  if (has) {
    const ul = document.createElement("ul");
    for (const c of n.children) ul.appendChild(hierNode(c));
    li.appendChild(ul);
    toggle.addEventListener("click", () => {
      const hidden = ul.style.display === "none";
      ul.style.display = hidden ? "" : "none";
      toggle.textContent = hidden ? "▾" : "▸";
    });
  }
  return li;
}
{
  const root = document.getElementById("hier");
  const ul = document.createElement("ul");
  for (const t of DATA.hierarchy) ul.appendChild(hierNode(t));
  root.appendChild(ul);
}

/* ---------- force view (canvas: SVG dies near 1k nodes) ---------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");
let width = 0, height = 0, transform = d3.zoomIdentity, query = "";

/* Phase-1 draw-loop budgets (viz-scalability): cap labels per frame and draw
   a weight-prioritized edge sample past a threshold so pan/zoom stays
   interactive on large graphs. Off-screen nodes/edges are culled regardless. */
const MAX_LABELS = 400;
const MAX_DRAWN_EDGES = 4000;

/* Aggregated "collapse" view (viz-scalability Phase 3). One supernode per
   Louvain community; with --full it is two-level (community -> units -> leaves).
   The visible graph is rebuilt from the `expanded` set of group ids each time
   it changes: every node resolves to the outermost still-collapsed group in its
   ancestry, or to itself once all its groups are open; edges are resolved+summed
   across whichever endpoints are live. */
const COLLAPSE = !!DATA.collapse;
const expanded = new Set();                 // open group ids ("comm:X" / "unit:Y")
const searchExpanded = new Set();           // subset opened by search (auto-collapse on clear)
const memberById = new Map(DATA.nodes.map(n => [n.id, n]));
const TWO_LEVEL = COLLAPSE && !!DATA.unitnodes;   // --full: community -> units -> leaves
const groupMeta = new Map();                       // entity id -> supernode metadata
if (COLLAPSE) {
  for (const s of DATA.supernodes) groupMeta.set("comm:" + s.id, {
    id: "comm:" + s.id, group: true, level: "comm", community: s.id,
    name: s.label, count: s.count, kind: "module", unresolved: false, domain: "", file: "" });
  if (TWO_LEVEL) for (const u of DATA.unitnodes) groupMeta.set("unit:" + u.id, {
    id: "unit:" + u.id, group: true, level: "unit", community: u.community,
    name: u.label, count: u.count, kind: "module", unresolved: false, domain: "", file: "" });
}
const unitIds = new Set(TWO_LEVEL ? DATA.unitnodes.map(u => u.id) : []);

// Ancestry of a node, outermost group first: [comm] or [comm, unit]. Nodes with
// no community (orphans like file/package nodes) have no group and stand alone.
function ancestry(n) {
  if (!COLLAPSE || !n.community) return [];
  const a = ["comm:" + n.community];
  if (TWO_LEVEL && n.unit) a.push("unit:" + n.unit);
  return a;
}
// Resolve a node id to its visible entity: the outermost still-collapsed group
// in its ancestry, or the node itself once all its groups are open.
function resolveEntity(id) {
  const n = memberById.get(id);
  if (!n) return id;
  for (const g of ancestry(n)) if (!expanded.has(g)) return g;
  return id;
}

// Remember entity positions across rebuilds so expand/collapse animates in
// place: a persistent entity keeps its spot, and a newly-revealed child emerges
// from its parent group instead of flying in from the origin.
const posById = new Map();
function snapshotPositions() {
  if (!nodes) return;
  for (const n of nodes)
    if (Number.isFinite(n.x)) posById.set(n.id, {x: n.x, y: n.y, vx: n.vx || 0, vy: n.vy || 0});
}
function seedPosition(entity) {
  const prior = posById.get(entity.id);
  if (prior) { entity.x = prior.x; entity.y = prior.y; entity.vx = prior.vx; entity.vy = prior.vy; return; }
  // New entity: start at the nearest ancestor group that already has a place.
  let anchor = null;
  if (entity.group) {
    if (entity.level === "unit") anchor = posById.get("comm:" + entity.community);
  } else {
    anchor = (entity.unit && posById.get("unit:" + entity.unit)) || posById.get("comm:" + entity.community);
  }
  if (anchor) { entity.x = anchor.x + (Math.random() - 0.5) * 30; entity.y = anchor.y + (Math.random() - 0.5) * 30; }
}

let nodes, links, byId;
function buildGraph() {
  if (!COLLAPSE) {
    nodes = DATA.nodes.map(n => ({...n}));
    byId = new Map(nodes.map(n => [n.id, n]));
    links = DATA.links.filter(l => byId.has(l.source) && byId.has(l.target)).map(l => ({...l}));
    return;
  }
  // Each node resolves to its outermost collapsed group, or itself when fully
  // open; a unit's own module node is never a leaf (its children replace it).
  nodes = [];
  const seen = new Set();
  for (const n of DATA.nodes) {
    const eid = resolveEntity(n.id);
    if (eid === n.id && unitIds.has(n.id)) continue;
    if (seen.has(eid)) continue;
    seen.add(eid);
    const entity = groupMeta.has(eid) ? {...groupMeta.get(eid)} : {...n};
    seedPosition(entity);  // keep/seed a position so expand/collapse animates in place
    nodes.push(entity);
  }
  byId = new Map(nodes.map(n => [n.id, n]));
  /* Resolve every edge to its live endpoints and sum parallel edges. */
  const agg = new Map();
  for (const l of DATA.links) {
    const s = resolveEntity(l.source), t = resolveEntity(l.target);
    if (s === t || !byId.has(s) || !byId.has(t)) continue;  // drop collapsed self-pairs
    const key = s + "␀" + t, prev = agg.get(key);
    if (prev) prev.weight += (l.weight || 1);
    else agg.set(key, {source: s, target: t, kind: "instantiates", confidence: 1, weight: l.weight || 1});
  }
  links = [...agg.values()];
}
buildGraph();

function radiusOf(n) {
  // Group supernodes scale with their member count (bounded); leaves fixed-size.
  return n && n.group ? Math.min(38, 6 + Math.sqrt(n.count) * 2.5) : 5;
}

/* "static" tier: coordinates were precomputed in Python and shipped in the
   payload (n.x / n.y), so we skip the simulation entirely and paint the first
   frame immediately; picking uses a d3.quadtree. "live" tier (the default for
   small graphs) keeps the in-browser force layout below, unchanged. */
const STATIC = DATA.layout === "static";
let sim = null, quadtree = null, needFit = false;

function rebuildQuadtree() {
  quadtree = d3.quadtree().x(d => d.x).y(d => d.y).addAll(nodes);
}

if (STATIC) {
  /* forceLink would normally swap source/target ids for node refs; do it by
     hand since no simulation runs. */
  for (const l of links) { l.source = byId.get(l.source); l.target = byId.get(l.target); }
  rebuildQuadtree();
  needFit = true;  // one-shot fit once the view has a non-zero size (see resize)
} else {
  /* Weak x/y gravity keeps disconnected components (and the big --full
     clouds) from repelling each other off to infinity; full mode also gets
     shorter links and softer charge so the layout stays compact. */
  const gravity = DATA.full ? 0.08 : 0.03;
  sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id)
      .distance(DATA.full ? 40 : 60).strength(0.4))
    .force("charge", d3.forceManyBody().strength(DATA.full ? -60 : -120))
    .force("center", d3.forceCenter())
    .force("x", d3.forceX().strength(gravity))
    .force("y", d3.forceY().strength(gravity))
    .force("collide", d3.forceCollide(10))
    .on("tick", draw)
    .on("end.fit", () => {
      /* One-shot fit once the layout settles — unless the user already
         panned or zoomed, in which case their viewpoint wins. */
      sim.on("end.fit", null);
      if (transform.k === 1 && transform.x === 0 && transform.y === 0) fitView();
    });
}

function nodeVisible(n) {
  if (!activeKinds.has(n.kind)) return false;
  if (n.community !== "" && DATA.communities.length && !activeComms.has(n.community)) return false;
  return true;
}
function draw() {
  ctx.save();
  ctx.clearRect(0, 0, width, height);
  ctx.translate(width / 2 + transform.x, height / 2 + transform.y);
  ctx.scale(transform.k, transform.k);
  const q = query.toLowerCase();

  /* Transformed viewport in world coordinates, padded a little, for culling. */
  const pad = 24;
  const vx0 = (-width / 2 - transform.x) / transform.k - pad;
  const vx1 = (width / 2 - transform.x) / transform.k + pad;
  const vy0 = (-height / 2 - transform.y) / transform.k - pad;
  const vy1 = (height / 2 - transform.y) / transform.k + pad;
  const inView = (x, y) => x >= vx0 && x <= vx1 && y >= vy0 && y <= vy1;

  /* Edges: filter (kind/visibility) and cull, then optionally down-sample by
     weight, then batch into one Path2D per (dash, width-bucket) so the whole
     graph strokes in a handful of draw calls instead of one per edge. */
  let drawn = [];
  for (const l of links) {
    if (!activeEdges.has(l.kind) || !nodeVisible(l.source) || !nodeVisible(l.target)) continue;
    if (!inView(l.source.x, l.source.y) && !inView(l.target.x, l.target.y)) continue;
    drawn.push(l);
  }
  const totalEdges = drawn.length;
  const sampled = drawn.length > MAX_DRAWN_EDGES;
  if (sampled) {
    drawn.sort((a, b) => (b.weight || 1) - (a.weight || 1));
    drawn = drawn.slice(0, MAX_DRAWN_EDGES);
  }
  const batches = new Map();  // "dash:widthBucket" -> {dash, width, path}
  for (const l of drawn) {
    const dash = l.confidence < 0.8 ? 1 : 0;
    const width = Math.round(Math.min(2.5, 0.6 + (l.weight || 1) * 0.3) * 2) / 2;
    const key = dash + ":" + width;
    let b = batches.get(key);
    if (!b) { b = { dash, width, path: new Path2D() }; batches.set(key, b); }
    b.path.moveTo(l.source.x, l.source.y);
    b.path.lineTo(l.target.x, l.target.y);
  }
  ctx.strokeStyle = "#3b4657";
  for (const b of batches.values()) {
    ctx.setLineDash(b.dash ? [4, 3] : []);
    ctx.lineWidth = b.width;
    ctx.stroke(b.path);
  }
  ctx.setLineDash([]);

  /* Nodes: cull off-screen, cap labels drawn per frame (search hits always
     labeled and counted first). */
  let shown = 0, labels = 0;
  const labelZoom = transform.k > 0.9;
  for (const n of nodes) {
    if (!nodeVisible(n)) continue;
    shown++;
    if (!inView(n.x, n.y)) continue;
    const hit = q && n.name.toLowerCase().includes(q);
    const r = radiusOf(n) + (hit ? 3 : 0);
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, 2 * Math.PI);
    ctx.fillStyle = q && !hit ? "#3b4657"
      : colorByCommunity && n.community !== "" ? commColor(n.community)
      : color(n.kind);
    ctx.fill();
    if (n.group) { ctx.strokeStyle = "#eceff4"; ctx.lineWidth = 1.5; ctx.stroke(); }
    else if (n.unresolved) { ctx.strokeStyle = "#bf616a"; ctx.lineWidth = 1.4; ctx.stroke(); }
    if ((labelZoom || hit || n.group) && labels < MAX_LABELS) {
      labels++;
      ctx.fillStyle = hit ? "#ffd479" : "#9aa3b2";
      ctx.font = "10px monospace";
      ctx.fillText(n.name, n.x + r + 3, n.y + 3);
    }
  }
  ctx.restore();
  const edgeNote = sampled ? `showing ${drawn.length} of ${totalEdges} edges` : `${links.length} edges`;
  document.getElementById("stats").textContent = nodes.length
    ? `${shown}/${nodes.length} nodes · ${edgeNote}`
    : "no nodes in the graph payload — rebuild and re-run visualize";
}
function refresh() { draw(); }

/* Declared before resize(): the static tier fits on the first resize() (see
   needFit below), and fitView() drives the view through this zoom behavior, so
   it must exist before that first call — otherwise the const is still in its
   temporal dead zone and the whole script aborts on large (static) graphs. */
const zoom = d3.zoom().scaleExtent([0.05, 8])
  .on("zoom", e => { transform = e.transform; draw(); });

let resizeRetries = 0;
function resize() {
  /* Size from the container, never from the canvas: where the canvas's own
     layout follows its bitmap, measuring the canvas feeds the result back
     into the bitmap and grows it 1.5x per ResizeObserver round until the
     renderer dies. Guard devicePixelRatio too — embedded viewers report 0. */
  const view = document.getElementById("view");
  const w = view.clientWidth, h = view.clientHeight;
  if (!w || !h) {
    /* Deferred-layout retry, bounded so a permanently 0x0 viewer doesn't
       keep an rAF chain alive forever; the ResizeObserver (and tab clicks)
       restart the wait whenever layout actually changes. */
    if (resizeRetries++ < 120) requestAnimationFrame(resize);
    return;
  }
  resizeRetries = 0;
  const dpr = window.devicePixelRatio || 1;
  if (w === width && h === height && canvas.width === Math.round(w * dpr)) return;
  width = w; height = h;
  canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
  /* Static tier has no settling simulation to fit on, so fit once here as
     soon as the view has a real size — unless the user already moved. */
  if (needFit && width && height &&
      transform.k === 1 && transform.x === 0 && transform.y === 0) {
    needFit = false;
    fitView();
  }
}
new ResizeObserver(resize).observe(document.getElementById("view"));
resize();

function pick(event) {
  const [px, py] = d3.pointer(event.sourceEvent || event, canvas);
  const x = (px - width / 2 - transform.x) / transform.k;
  const y = (py - height / 2 - transform.y) / transform.k;
  const radius = (COLLAPSE ? 40 : 12) / transform.k;  // supernodes are larger targets
  const n = STATIC ? quadtree.find(x, y, radius) : sim.find(x, y, radius);
  return n && nodeVisible(n) ? n : null;
}
d3.select(canvas)
  .call(d3.drag()
    .subject(pick)
    /* Live tier nudges the simulation; static tier repositions the node
       directly (no physics) and rebuilds the picking quadtree on drop. */
    .on("start", e => {
      if (STATIC) return;
      if (!e.active) sim.alphaTarget(0.25).restart();
      e.subject.fx = e.subject.x; e.subject.fy = e.subject.y;
    })
    .on("drag", e => {
      if (STATIC) { e.subject.x = e.x; e.subject.y = e.y; draw(); return; }
      e.subject.fx = e.x; e.subject.fy = e.y;
    })
    .on("end", e => {
      if (STATIC) { rebuildQuadtree(); return; }
      if (!e.active) sim.alphaTarget(0);
      e.subject.fx = null; e.subject.fy = null;
    }))
  .call(zoom);

/* Collapse view drill-down: double-click a supernode to expand it one level
   (community -> units -> leaves), a leaf to re-collapse its innermost group, or
   empty space to collapse everything. rebuild() re-derives the visible graph
   from `expanded`, re-binds the simulation, and reheats it so entities settle. */
function rebuild() {
  snapshotPositions();  // remember where everything is before the graph changes
  buildGraph();
  sim.nodes(nodes);
  sim.force("link").links(links);
  sim.alpha(0.6).restart();
}

/* Search auto-expand: a hit hidden inside a collapsed group is invisible, so
   open every group on the way to each match (and re-collapse the ones we opened
   once the query clears, leaving the user's manual expansions alone). Returns
   whether the expanded set changed. */
function syncSearchExpansion(q) {
  if (!COLLAPSE) return false;
  const want = new Set();
  if (q) for (const n of DATA.nodes)
    if (n.name.toLowerCase().includes(q)) for (const g of ancestry(n)) want.add(g);
  let changed = false;
  for (const g of want) if (!expanded.has(g)) { expanded.add(g); searchExpanded.add(g); changed = true; }
  for (const g of [...searchExpanded]) if (!want.has(g)) {
    searchExpanded.delete(g);
    if (expanded.has(g)) { expanded.delete(g); changed = true; }
  }
  return changed;
}
if (COLLAPSE) {
  d3.select(canvas).on("dblclick.zoom", null);  // reclaim dblclick for drill-down
  canvas.addEventListener("dblclick", event => {
    const n = pick(event);
    if (!n) {  // double-click empty space collapses everything back to communities
      if (expanded.size) { expanded.clear(); searchExpanded.clear(); rebuild(); }
      return;
    }
    if (n.group) { expanded.add(n.id); searchExpanded.delete(n.id); rebuild(); return; }  // drill in
    // A leaf: collapse its innermost still-open group (unit, else community).
    const chain = ancestry(n);
    for (let i = chain.length - 1; i >= 0; i--) if (expanded.has(chain[i])) {
      expanded.delete(chain[i]); searchExpanded.delete(chain[i]); rebuild(); return;
    }
  });
}
function fitView() {
  /* Pan/zoom so the visible nodes fill ~90% of the viewport. Applied via
     zoom.transform so d3's internal state stays in sync for later gestures. */
  let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
  for (const n of nodes) {
    if (!nodeVisible(n)) continue;
    if (n.x < x0) x0 = n.x; if (n.x > x1) x1 = n.x;
    if (n.y < y0) y0 = n.y; if (n.y > y1) y1 = n.y;
  }
  let t = d3.zoomIdentity;
  if (x0 <= x1 && width && height) {
    const k = Math.max(0.05, Math.min(2,
      0.9 * Math.min(width / Math.max(1, x1 - x0 + 40), height / Math.max(1, y1 - y0 + 40))));
    t = d3.zoomIdentity.translate(-k * (x0 + x1) / 2, -k * (y0 + y1) / 2).scale(k);
  }
  d3.select(canvas).call(zoom.transform, t);
}
document.getElementById("recenter").addEventListener("click", fitView);
canvas.addEventListener("mousemove", event => {
  const n = pick(event);
  if (!n) { tooltip.style.display = "none"; return; }
  tooltip.style.display = "block";
  tooltip.style.left = (event.offsetX + 14) + "px";
  tooltip.style.top = (event.offsetY + 14) + "px";
  if (n.group) {
    const what = n.level === "unit" ? `unit of ${n.count} node(s)` : `subsystem of ${n.count} unit(s)`;
    tooltip.innerHTML = `<b>${esc(n.name)}</b><br>${what}`
      + `<br>community: ${esc(n.community)}<br>double-click to expand`;
    return;
  }
  tooltip.innerHTML = `<b>${esc(n.name)}</b><br>${esc(n.kind)}`
    + (n.domain ? `<br>domain: ${esc(n.domain)}` : "")
    + (n.community !== "" ? `<br>community: ${esc(n.community)}` : "")
    + (n.file ? `<br>${esc(n.file)}${n.line ? ":" + n.line : ""}` : "");
});

/* ---------- tabs + search ---------- */
const views = { hier: document.getElementById("hier"), graph: canvas };
for (const tab of document.querySelectorAll(".tab")) {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const which = tab.dataset.tab;
    views.hier.style.display = which === "hier" ? "block" : "none";
    /* visibility (not display) so the canvas always has its layout size:
       sizing it only on first tab switch breaks in viewers with deferred
       layout. Hidden elements get no pointer events, so #hier still works. */
    canvas.style.visibility = which === "graph" ? "visible" : "hidden";
    document.getElementById("recenter").style.display = which === "graph" ? "block" : "none";
    if (which === "graph") {
      resize();
      /* Frame the graph the first time it is revealed, in case the layout
         settled while the canvas was hidden — unless the user already moved. */
      if (transform.k === 1 && transform.x === 0 && transform.y === 0) fitView();
    }
  });
}
views.hier.style.display = "block"; canvas.style.visibility = "hidden";
document.getElementById("search").addEventListener("input", e => {
  query = e.target.value.trim();
  const q = query.toLowerCase();
  // In collapse mode, reveal hits hidden inside collapsed communities first;
  // rebuild restarts the sim (which redraws), else just redraw the highlight.
  if (syncSearchExpansion(q)) rebuild(); else draw();
  for (const el of document.querySelectorAll("#hier .mod, #hier .inst"))
    el.style.background = q && el.textContent.toLowerCase().includes(q) ? "#4c3a1e" : "";
});
})();
</script>
</body>
</html>
